name: Deploy DMS
on:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env: { POSTGRES_PASSWORD: test, POSTGRES_DB: dms_test, POSTGRES_USER: dms_user }
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 5s --health-retries 10
      meilisearch:
        image: getmeili/meilisearch:v1.7
        ports: ['7700:7700']
        env: { MEILI_MASTER_KEY: change_me, MEILI_ENV: development }
        options: --health-cmd "curl -f http://localhost:7700/health" --health-interval 5s --health-retries 10
    env:
      POSTGRES_DB: dms_test
      POSTGRES_USER: dms_user
      POSTGRES_PASSWORD: test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      MEILI_HOST: http://localhost:7700
      MEILI_MASTER_KEY: change_me
      DJANGO_SECRET_KEY: test-secret-key-1234567890
      DJANGO_DEBUG: 'True'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r backend/requirements.txt
      - run: python backend/manage.py makemigrations --check --dry-run  # fail if migrations are missing in codebase
      - run: python backend/manage.py migrate  # verify migrations apply cleanly to a database
      - run: python backend/manage.py test --verbosity=2  # run all tests
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Run Go API tests
        run: |
          cd go-api
          go test -v ./...


  deploy:
    needs: test
    runs-on: ubuntu-latest
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
    steps:
      - uses: actions/checkout@v4
        if: ${{ env.SERVER_HOST != '' }}
      - name: Backup DB before deploy
        uses: appleboy/ssh-action@v1
        if: ${{ env.SERVER_HOST != '' }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker exec dms-db pg_dump -U dms_user dms \
              > /backups/pre-deploy-$(date +%Y%m%d%H%M).sql
      - name: Pull + migrate + restart
        uses: appleboy/ssh-action@v1
        if: ${{ env.SERVER_HOST != '' }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/dms
            git pull origin main
            docker compose up -d --build
