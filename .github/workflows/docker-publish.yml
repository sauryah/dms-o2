name: Build & Publish Docker Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Image version tag (e.g., 1.0.0). Defaults to 'latest'."
        required: false
        default: "latest"

env:
  DOCKERHUB_NAMESPACE: sauryah
  GHCR_NAMESPACE: ghcr.io/sauryah/dms-o2

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Set up Docker Buildx (multi-platform support)
      # ------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ------------------------------------------------------------------
      # 3. Set up QEMU (for ARM64 cross-compilation)
      # ------------------------------------------------------------------
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ------------------------------------------------------------------
      # 4. Log in to Docker Hub
      # ------------------------------------------------------------------
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ------------------------------------------------------------------
      # 5. Log in to GitHub Container Registry
      # ------------------------------------------------------------------
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------------
      # 6. Determine version tag
      # ------------------------------------------------------------------
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            # Strip the leading 'v' from tag (v1.0.0 -> 1.0.0)
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version || 'latest' }}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Building version: $VERSION"

      # ------------------------------------------------------------------
      # 7. Build & Push — Backend (Django)
      # ------------------------------------------------------------------
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/dms-backend:${{ steps.version.outputs.VERSION }}
            ${{ env.DOCKERHUB_NAMESPACE }}/dms-backend:latest
            ${{ env.GHCR_NAMESPACE }}/backend:${{ steps.version.outputs.VERSION }}
            ${{ env.GHCR_NAMESPACE }}/backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # ------------------------------------------------------------------
      # 8. Build & Push — Frontend (React + Nginx)
      # ------------------------------------------------------------------
      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/dms-frontend:${{ steps.version.outputs.VERSION }}
            ${{ env.DOCKERHUB_NAMESPACE }}/dms-frontend:latest
            ${{ env.GHCR_NAMESPACE }}/frontend:${{ steps.version.outputs.VERSION }}
            ${{ env.GHCR_NAMESPACE }}/frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      # ------------------------------------------------------------------
      # 9. Build & Push — Go API
      # ------------------------------------------------------------------
      - name: Build & push go-api
        uses: docker/build-push-action@v6
        with:
          context: ./go-api
          file: ./go-api/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/dms-go-api:${{ steps.version.outputs.VERSION }}
            ${{ env.DOCKERHUB_NAMESPACE }}/dms-go-api:latest
            ${{ env.GHCR_NAMESPACE }}/go-api:${{ steps.version.outputs.VERSION }}
            ${{ env.GHCR_NAMESPACE }}/go-api:latest
          cache-from: type=gha,scope=go-api
          cache-to: type=gha,mode=max,scope=go-api

      # ------------------------------------------------------------------
      # 10. Summary
      # ------------------------------------------------------------------
      - name: Print image summary
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "## 🐳 Published Docker Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Docker Hub | GHCR |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | \`${{ env.DOCKERHUB_NAMESPACE }}/dms-backend:${VERSION}\` | \`${{ env.GHCR_NAMESPACE }}/backend:${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | \`${{ env.DOCKERHUB_NAMESPACE }}/dms-frontend:${VERSION}\` | \`${{ env.GHCR_NAMESPACE }}/frontend:${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Go API | \`${{ env.DOCKERHUB_NAMESPACE }}/dms-go-api:${VERSION}\` | \`${{ env.GHCR_NAMESPACE }}/go-api:${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
