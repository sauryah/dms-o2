name: Build & Publish Docker Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Image version tag (e.g., 1.0.0). Defaults to 'latest'."
        required: false
        default: "latest"

env:
  DOCKERHUB_NAMESPACE: sauryah
  GHCR_NAMESPACE: ghcr.io/sauryah/dms-o2

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Set up Docker Buildx (multi-platform support)
      # ------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ------------------------------------------------------------------
      # 3. Set up QEMU (for ARM64 cross-compilation)
      # ------------------------------------------------------------------
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ------------------------------------------------------------------
      # 4. Log in to Docker Hub
      # ------------------------------------------------------------------
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ------------------------------------------------------------------
      # 5. Log in to GitHub Container Registry
      # ------------------------------------------------------------------
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------------
      # 6. Determine version tag
      # ------------------------------------------------------------------
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            # Strip the leading 'v' from tag (v1.0.0 -> 1.0.0)
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version || 'latest' }}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Building version: $VERSION"

      # ------------------------------------------------------------------
      # 7. Build & Push — Unified App (Monolithic)
      # ------------------------------------------------------------------
      - name: Build & push unified app
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/dms-app:${{ steps.version.outputs.VERSION }}
            ${{ env.DOCKERHUB_NAMESPACE }}/dms-app:latest
            ${{ env.GHCR_NAMESPACE }}/app:${{ steps.version.outputs.VERSION }}
            ${{ env.GHCR_NAMESPACE }}/app:latest
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      # ------------------------------------------------------------------
      # 8. Summary
      # ------------------------------------------------------------------
      - name: Print image summary
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "## 🐳 Published Docker Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Docker Hub | GHCR |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unified App | \`${{ env.DOCKERHUB_NAMESPACE }}/dms-app:${VERSION}\` | \`${{ env.GHCR_NAMESPACE }}/app:${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
