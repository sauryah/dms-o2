        - List FLAT dies by thickness: `/api/dies/?die_type=FLAT&thick_min=2.0&thick_max=2.5`

        **Permissions:** ADMIN, ROOT or OPERATOR (for relocation only)

        **Authentication:** Required (JWT Bearer token)
      tags:
      - api
      requestBody:
        content:
