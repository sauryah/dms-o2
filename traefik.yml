providers:
  docker:
    exposedByDefault: false
  file:
    watch: true
    filename: /etc/traefik/dynamic.yml

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

accessLog: {}

api:
  dashboard: false
