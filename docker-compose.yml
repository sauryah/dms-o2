# Password recovery: docker compose exec django python manage.py changepassword root
x-common-env: &common-env
  POSTGRES_DB: ${POSTGRES_DB}
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_HOST: ${POSTGRES_HOST}
  POSTGRES_PORT: ${POSTGRES_PORT}
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
  DJANGO_DEBUG: ${DJANGO_DEBUG}
  DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
  MEILI_HOST: ${MEILI_HOST}
  MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
  ROOT_USERNAME: ${ROOT_USERNAME}
  ROOT_PASSWORD: ${ROOT_PASSWORD}
  SESSION_IDLE_TIMEOUT_MINUTES: ${SESSION_IDLE_TIMEOUT_MINUTES}
  SESSION_ABSOLUTE_TIMEOUT_HOURS: ${SESSION_ABSOLUTE_TIMEOUT_HOURS}
  INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}

services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    command: >
      postgres
      -c lock_timeout=30000
      -c idle_in_transaction_session_timeout=300000
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 3s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python manage.py migrate --noinput
    volumes:
      - ./backend:/app
    environment:
      <<: *common-env
    depends_on:
      db:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    restart: "no"

  django:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: gunicorn dms.wsgi:application --bind 0.0.0.0:8000 --workers 3 --reload
    volumes:
      - ./backend:/app
      - ./backups:/backups
    environment:
      <<: *common-env
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      migrate:
        condition: service_completed_successfully
    stop_grace_period: 2m
    healthcheck:

      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.django.rule=PathPrefix(`/api`) || PathPrefix(`/admin`)"
      - "traefik.http.routers.django.entrypoints=websecure"
      - "traefik.http.routers.django.tls=true"
      - "traefik.http.routers.django.priority=50"
      - "traefik.http.services.django.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.api-ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.api-ratelimit.ratelimit.burst=150"
      - "traefik.http.routers.django.middlewares=api-ratelimit,api-compress"
      - "traefik.http.middlewares.api-compress.compress=true"
      # Dedicated login route rate limiting
      - "traefik.http.routers.django-login.rule=Path(`/api/auth/login/`)"
      - "traefik.http.routers.django-login.entrypoints=websecure"
      - "traefik.http.routers.django-login.tls=true"
      - "traefik.http.routers.django-login.priority=60"
      - "traefik.http.routers.django-login.middlewares=login-ratelimit,api-compress"
      - "traefik.http.middlewares.login-ratelimit.ratelimit.average=5"
      - "traefik.http.middlewares.login-ratelimit.ratelimit.period=1m"
      - "traefik.http.middlewares.login-ratelimit.ratelimit.burst=10"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A dms worker -l warning --concurrency=4
    volumes:
      - ./backend:/app
      - ./backups:/backups
    environment:
      <<: *common-env
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    stop_grace_period: 2m
    healthcheck:
      test: ["CMD-SHELL", "celery -A dms inspect ping"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 10s


  go-api:
    build:
      context: ./go-api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - MEILI_HOST=${MEILI_HOST}
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - MEILI_SEARCH_KEY=${MEILI_SEARCH_KEY}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - PORT=8080
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      db:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/go/health"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.go-api.rule=PathPrefix(`/api/go`) || PathPrefix(`/api/events`)"
      - "traefik.http.routers.go-api.entrypoints=websecure"
      - "traefik.http.routers.go-api.tls=true"
      - "traefik.http.routers.go-api.priority=100"
      - "traefik.http.routers.go-api.middlewares=go-compress"
      - "traefik.http.services.go-api.loadbalancer.server.port=8080"
      - "traefik.http.middlewares.go-compress.compress=true"

  meilisearch:
    image: getmeili/meilisearch:v1.7
    restart: unless-stopped
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - MEILI_ENV=development
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      django:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
      - "traefik.http.middlewares.frontend-compress.compress=true"
      - "traefik.http.routers.frontend.middlewares=frontend-compress"

  traefik:
    image: traefik:v3
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./certs:/certs:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--no-check-certificate", "http://127.0.0.1:80"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      django:
        condition: service_healthy
      frontend:
        condition: service_started

  backup:
    image: postgres:18-alpine
    restart: always
    volumes:
      - ./backups:/backups
      - ./scripts:/scripts:ro
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - HISTORY_RETENTION_DAYS=${HISTORY_RETENTION_DAYS:-365}
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x crond || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    entrypoint: |
      sh -c '
      echo "export PATH=\"$$PATH\"" > /env.sh
      echo "export POSTGRES_DB=\"$$POSTGRES_DB\"" >> /env.sh
      echo "export POSTGRES_USER=\"$$POSTGRES_USER\"" >> /env.sh
      echo "export POSTGRES_PASSWORD=\"$$POSTGRES_PASSWORD\"" >> /env.sh
      echo "export POSTGRES_HOST=\"$$POSTGRES_HOST\"" >> /env.sh
      echo "export POSTGRES_PORT=\"$$POSTGRES_PORT\"" >> /env.sh
      echo "export HISTORY_RETENTION_DAYS=\"$$HISTORY_RETENTION_DAYS\"" >> /env.sh
      chmod +x /env.sh
      echo "0 2 * * * . /env.sh; /scripts/backup_db.sh >> /proc/1/fd/1 2>&1" > /etc/crontabs/root
      echo "0 3 * * * . /env.sh; /scripts/prune_history.sh >> /proc/1/fd/1 2>&1" >> /etc/crontabs/root
      echo ">>> Starting crond in background..."
      crond -f -l 2
      '
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  meili_data:
